name: RespiScope Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test_access_secret_123456789
          JWT_REFRESH_SECRET: test_refresh_secret_987654321
          MONGO_URI: mongodb://localhost:27017/test
        run: npm test
