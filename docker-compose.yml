
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - ai-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Expose Nginx port 80 as 3000 on the host
      - "3000:80"
    depends_on:
      - backend
      - ai-service
    restart: unless-stopped

  ai-service:
    build:
      context: ./backend/ai_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
